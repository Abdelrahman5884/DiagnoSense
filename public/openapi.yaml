            description: 'Accepted - Data is being prepared'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: true
                    message: "Preparing patient data..."
                    data: null
          403:
            description: 'Forbidden - Doctor does not own this patient record'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: false
                    message: "Unauthorized"
