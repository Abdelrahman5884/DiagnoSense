          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - question
                properties:
                  question:
                    type: string
                    minLength: 3
                    description: 'The specific question about the patient’s medical history or reports.'
                    example: "What are the key risks found in the latest blood test?"
        responses:
          200:
            description: 'AI Answer retrieved successfully'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: true
                    message: "Answer from chatbot"
                    data: "Based on the reports, the patient shows elevated glucose levels suggesting a risk of Type 2 Diabetes."
