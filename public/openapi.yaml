openapi: 3.0.3
info:
  title: 'DiagnoSense API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  - name: Auth
    description: 'Operations related to User Authentication (Login, Register, OTP, etc.)'
  - name: Patients List
    description: 'Operations related to the list of patients (viewing, filtering, searching, etc.)'
  - name: Patient Profile
    description: 'Operations related to a specific patient (viewing profile, adding notes, updating status, etc.)'
  - name: Subscriptions
    description: 'Operations related to subscription plans and transactions.'
  - name: Notifications
    description: 'Operations related to user notifications.'
  - name: Dashboard
    description: 'Operations related to dashboard data and summaries.'
  - name: Support & Help
    description: 'Operations related to customer support and help resources.'
  - name: Doctor Profile
    description: 'Operations related to doctor profile management.'
paths:
  '/api/v1/auth/register':
    post:
      summary: 'Register'
      operationId: postApiV1AuthRegister
      description: 'Creates a new doctor account using a unified contact field (Email or Phone) and returns an access token.'
      tags:
        - Auth
      security: [] # No token needed for registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - contact
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "Menna Baligh"
                contact:
                  type: string
                  description: 'Can be a valid Email address or a Phone number.'
                  example: "menna@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
                password_confirmation:
                  type: string
                  format: password
                  example: "password123"
      responses:
        201:
          description: 'User registered successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "User registered successfully"
                  data:
                    user:
                      id: 1
                      name: "Menna Baligh"
                      contact: "menna@example.com"
                      created_at: "2026-05-08 01:00:00"
                      updated_at: "2026-05-08 01:00:00"
                    token: "1|def456..."
        422:
          description: 'Validation Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "The contact has already been taken."
                  data: null
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to register user, please try again later."
                  data: null
  '/api/v1/auth/login/{type}':
    post:
      summary: 'Login'
      operationId: postApiV1AuthLogin
      description: 'Authenticates a user (doctor or patient) using their contact (Email or Phone) and returns an access token.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          description: 'The type of user attempting to login.'
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contact
                - password
              properties:
                contact:
                  type: string
                  description: 'The user email address or phone number.'
                  example: "menna@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
      responses:
        200:
          description: 'Login successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Login successful"
                  data:
                    user:
                      id: 1
                      name: "Menna Baligh"
                      contact: "menna@example.com"
                      created_at: "2026-05-08 01:00:00"
                      updated_at: "2026-05-08 01:00:00"
                    token: "2|ghi789..."
        401:
          description: 'Unauthorized - Invalid credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid credentials"
                  data: null
        422:
          description: 'Validation Error - Invalid contact format or missing fields'
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to login, please try again later."
  '/api/v1/auth/forget-password/{type}':
    post:
      summary: 'Forget Password'
      operationId: postApiV1AuthForgetPassword
      description: 'Sends a 6-digit OTP to the provided contact (email or phone) if the user exists.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact]
              properties:
                contact:
                  type: string
                  description: 'The registered email or phone number.'
                  example: "menna@example.com"
      responses:
        200:
          description: 'OTP sent successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP has been sent to your registered contact."
        404:
          description: 'User not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User not found with these credentials."
        422:
          description: 'Validation Error'

  '/api/v1/auth/verify-otp/{type}':
    post:
      summary: 'Verify OTP'
      operationId: postApiV1AuthVerifyOtp
      description: 'Validates the OTP and returns a temporary reset token to be used for password reset.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact, otp]
              properties:
                contact:
                  type: string
                  example: "menna@example.com"
                otp:
                  type: string
                  example: "123456"
      responses:
        200:
          description: 'OTP verified successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP verified. You can now reset your password."
                  data:
                    reset_token: "3|abc123token..."
        400:
          description: 'Invalid OTP or User Type'

  '/api/v1/auth/reset-password/{type}':
    post:
      summary: 'Reset Password'
      operationId: postApiV1AuthResetPassword
      description: 'Updates the password using the reset token obtained from OTP verification.'
      tags:
        - Auth
      security:
        - sanctum: [] # This endpoint requires the reset_token as a Bearer token
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, password_confirmation]
              properties:
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "new_secure_password"
                password_confirmation:
                  type: string
                  format: password
                  example: "new_secure_password"
      responses:
        200:
          description: 'Password reset successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Password has been reset successfully."
        401:
          description: 'Unauthorized - Invalid or expired reset token'
  '/api/v1/auth/logout/{type}':
    post:
      summary: 'Logout'
      operationId: postApiV1AuthLogout
      description: 'Revokes the current access token for the authenticated doctor or patient.'
      tags:
        - Auth
      security:
        - sanctum: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      responses:
        200:
          description: 'Logout successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Logout successful"
                  data: null
        401:
          $ref: '#/components/responses/Unauthorized'

  '/api/v1/auth/verify-contact':
    post:
      summary: 'Verify Contact'
      operationId: postApiV1AuthVerifyContact
      description: 'Verifies the user contact (email or phone) using the 6-digit OTP sent during registration.'
      tags:
        - Auth
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        200:
          description: 'Verification successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "User verified successfully."
        401:
          description: 'Invalid or expired OTP'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid or expired OTP."

  '/api/v1/auth/resend-otp':
    get:
      summary: 'Resend Verification OTP'
      operationId: getApiV1AuthResendOtp
      description: 'Triggers a new OTP to be sent to the user registered contact if not already verified.'
      tags:
        - Auth
      security:
        - sanctum: []
      responses:
        200:
          description: 'OTP sent successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP sent successfully."
        409:
          description: 'Conflict - User already verified'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User already verified."
        401:
          $ref: '#/components/responses/Unauthorized'
  '/api/v1/auth/google/redirect':
    get:
      summary: 'Login With Google'
      operationId: getApiV1AuthGoogleRedirect
      description: 'Generates and returns the Google OAuth2 authorization URL. The frontend should redirect the user to this URL.'
      tags:
        - Auth
      security: [] # Public endpoint
      responses:
        200:
          description: 'Redirect URL generated successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Redirect URL generated"
                  data:
                    url: "https://accounts.google.com/o/oauth2/auth?client_id=1070705461335...&redirect_uri=...&scope=openid+profile+email&response_type=code"
        500:
          description: 'Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unable to connect to Google at the moment"
                  data: null
  '/api/v1/patients':
    get:
      summary: 'List + Search + Filter'
      operationId: getApiV1PatientsIndex
      description: 'Retrieves a paginated list of patients associated with the authenticated doctor. Supports searching by name/National ID and filtering by health status.'
      tags:
        - Patients List
      security:
        - sanctum: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: 'Search by patient name or National ID.'
          example: "Ahmed"
        - in: query
          name: status
          schema:
            type: string
            enum: [critical, stable, under review]
          description: 'Filter patients by their current health status.'
          example: "stable"
        - in: query
          name: page
          schema:
            type: integer
          description: 'The page number for pagination.'
          example: 1
      responses:
        200:
          description: 'Patients list retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Patients list retrieved successfully"
                  data:
                    data: # This is the array from PatientResource
                      - id: 48
                        name: "Menna Baligh"
                        age: 22
                        status: "stable"
                        ai_insight: "Patient shows steady recovery signs."
                        last_visit: "May 01, 2026"
                        next_appointment: "May 15, 2026"
                      - id: 50
                        name: "Ahmed Mohamed"
                        age: 45
                        status: "critical"
                        ai_insight: "Abnormal cardiac rhythm detected."
                        last_visit: "May 07, 2026"
                        next_appointment: "Not scheduled"
                    links: # Laravel Pagination Links
                      first: "http://localhost:8000/api/v1/patients?page=1"
                      last: "http://localhost:8000/api/v1/patients?page=5"
                      prev: null
                      next: "http://localhost:8000/api/v1/patients?page=2"
                    meta: # Laravel Pagination Meta
                      current_page: 1
                      from: 1
                      last_page: 5
                      path: "http://localhost:8000/api/v1/patients"
                      per_page: 12
                      to: 12
                      total: 60
        401:
          $ref: '#/components/responses/Unauthorized'
        500:
          description: 'Internal Server Error'
    post:
      summary: 'Upload Patient Data'
      operationId: postApiPatients
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patients List
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                  nullable: false
                email:
                  type: string
                  description: 'This field is required when <code>phone</code> is not present. Must be a valid email address. Must not be greater than 255 characters.'
                  example: kunde.eloisa@example.com
                  nullable: false
                phone:
                  type: string
                  description: 'This field is required when <code>email</code> is not present. Must be at least 10 characters. Must not be greater than 15 characters.'
                  example: hfqcoynlazghd
                  nullable: false
                age:
                  type: integer
                  description: ''
                  example: 17
                  nullable: true
                gender:
                  type: string
                  description: ''
                  example: female
                  nullable: true
                  enum:
                    - male
                    - female
                national_id:
                  type: string
                  description: 'Must not be greater than 15 characters.'
                  example: mqeopfuudtdsu
                  nullable: true
                is_smoker:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                previous_surgeries:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                chronic_diseases:
                  type: array
                  description: ''
                  example:
                    - consequatur
                  items:
                    type: string
                previous_surgeries_name:
                  type: string
                  description: 'This field is required when <code>previous_surgeries</code> is <code>true</code>.'
                  example: consequatur
                  nullable: false
                medications:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                allergies:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                family_history:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                lab:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                radiology:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                medical_history:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                current_complaint:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
              required:
                - name
      security: []
  '/api/patients/{patientId}/key-info':
    get:
      summary: 'Get Patient Key Info'
      operationId: getApiPatientsPatientIdKeyInfo
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Patient Profile
      security: []
    post:
      summary: 'Add New Note'
      operationId: postApiPatientsPatientIdKeyInfo
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                insight:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: false
                priority:
                  type: string
                  description: ''
                  example: high
                  nullable: false
                  enum:
                    - high
                    - medium
                    - low
              required:
                - insight
                - priority
      security: []
    parameters:
      -
        in: path
        name: patientId
        description: ''
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patientId}/overview':
    get:
      summary: 'Get Patient Overview'
      operationId: getApiPatientsPatientIdOverview
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Patient Profile
      security: []
    parameters:
      -
        in: path
        name: patientId
        description: ''
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patient}/status':
    patch:
      summary: 'Update Patient Status'
      operationId: patchApiPatientsPatientStatus
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: ''
                  example: critical
                  nullable: false
                  enum:
                    - critical
                    - stable
                    - 'under review'
              required:
                - status
      security: []
    parameters:
      -
        in: path
        name: patient
        description: 'The patient.'
        example: consequatur
        required: true
        schema:
          type: string
  '/api/key-points/{keyPointId}':
    delete:
      summary: 'Delete Key Point'
      operationId: deleteApiKeyPointsKeyPointId
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      security: []
    patch:
      summary: 'Edit Key Point'
      operationId: patchApiKeyPointsKeyPointId
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                insight:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: false
              required:
                - insight
      security: []
    parameters:
      -
        in: path
        name: keyPointId
        description: ''
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patientId}/decision-support':
    get:
      summary: 'Get Decision Support'
      operationId: getApiPatientsPatientIdDecisionSupport
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Patient Profile
      security: []
    parameters:
      -
        in: path
        name: patientId
        description: ''
        example: consequatur
        required: true
        schema:
          type: string
  /api/visits:
    post:
      summary: 'Add New Visit'
      operationId: postApiVisits
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patient_id:
                  type: string
                  description: 'The <code>id</code> of an existing record in the patients table.'
                  example: consequatur
                  nullable: false
                has_next_visit:
                  type: boolean
                  description: ''
                  example: false
                  nullable: false
                next_visit_date:
                  type: string
                  description: 'This field is required when <code>has_next_visit</code> is <code>true</code>. Must be a valid date.'
                  example: '2026-03-03T22:56:11'
                  nullable: false
                action:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: mqeopfuudtdsufvyvddqa
                  nullable: false
                  enum:
                    - save
                    - next
              required:
                - patient_id
                - has_next_visit
                - action
      security: []
  '/api/visits/{visit}/items':
    post:
      summary: 'Add Tasks or Medications'
      operationId: postApiVisitsVisitItems
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                  nullable: false
                  enum:
                    - medication
                    - task
                name:
                  type: string
                  description: 'This field is required when <code>type</code> is <code>medication</code>. Must not be greater than 255 characters.'
                  example: amniihfqcoynlazghdtqt
                  nullable: false
                dosage:
                  type: string
                  description: 'This field is required when <code>type</code> is <code>medication</code>. Must not be greater than 255 characters.'
                  example: qxbajwbpilpmufinllwlo
                  nullable: false
                frequency:
                  type: string
                  description: 'This field is required when <code>type</code> is <code>medication</code>. Must not be greater than 255 characters.'
                  example: auydlsmsjuryvojcybzvr
                  nullable: false
                duration:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: byickznkygloigmkwxphl
                  nullable: true
                title:
                  type: string
                  description: 'This field is required when <code>type</code> is <code>task</code>. Must not be greater than 255 characters.'
                  example: vazjrcnfbaqywuxhgjjmz
                  nullable: false
                description:
                  type: string
                  description: ''
                  example: 'Dolores dolorum amet iste laborum eius est dolor.'
                  nullable: true
                notes:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                next_visit_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-03-03T22:56:11'
                  nullable: true
                action:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: mqeopfuudtdsufvyvddqa
                  nullable: false
                  enum:
                    - save
                    - save_and_create_another
              required:
                - type
                - action
      security: []
    parameters:
      -
        in: path
        name: visit
        description: 'The visit.'
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patient}/items':
    get:
      summary: 'Get Tasks and Medications for a Patient'
      operationId: getApiPatientsPatientItems
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Patient Profile
      security: []
    parameters:
      -
        in: path
        name: patient
        description: 'The patient.'
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patient}/medications/{medication}':
    delete:
      summary: 'Delete a Medication for a Patient'
      operationId: deleteApiPatientsPatientMedicationsMedication
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      security: []
    parameters:
      -
        in: path
        name: patient
        description: 'The patient.'
        example: consequatur
        required: true
        schema:
          type: string
      -
        in: path
        name: medication
        description: 'The medication.'
        example: consequatur
        required: true
        schema:
          type: string
  '/api/patients/{patient}/tasks/{task}':
    delete:
      summary: 'Delete a Task for a Patient'
      operationId: deleteApiPatientsPatientTasksTask
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Patient Profile
      security: []
    parameters:
      -
        in: path
        name: patient
        description: 'The patient.'
        example: consequatur
        required: true
        schema:
          type: string
      -
        in: path
        name: task
        description: 'The task.'
        example: consequatur
